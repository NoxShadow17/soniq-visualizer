<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Bar — Neon Visualizer</title>
  <meta name="description" content="A high-end reactive audio visualizer with neon glassmorphism, frequency splitting, peak metering and particle effects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-shell">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">SONIQ</span>
      </div>
      <p class="tagline">Reactive Audio Visualizer</p>
    </header>

    <!-- Canvas -->
    <main class="visualizer-wrapper" id="visualizer-wrapper">
      <canvas id="vizCanvas"></canvas>
      <div class="idle-message" id="idleMsg">
        <span class="idle-icon">♫</span>
        <p>Upload a track or choose a demo to begin</p>
      </div>
    </main>

    <!-- Mode switcher -->
    <div class="mode-switcher" id="modeSwitcher" role="tablist" aria-label="Visualizer mode">
      <button class="btn-mode active" data-mode="bars"      role="tab" aria-selected="true">⬛ Bars</button>
      <button class="btn-mode"        data-mode="wave"      role="tab" aria-selected="false">〰 Wave</button>
      <button class="btn-mode"        data-mode="circular"  role="tab" aria-selected="false">◎ Radial</button>
      <button class="btn-mode"        data-mode="lissajous" role="tab" aria-selected="false">∞ Lissajous</button>
    </div>

    <!-- Band meters -->
    <div class="band-meters" id="bandMeters" aria-label="Frequency band meters">
      <div class="band" id="bandBass">
        <div class="band-bar-bg"><div class="band-fill bass-fill" id="fillBass"></div></div>
        <span class="band-label">BASS</span>
      </div>
      <div class="band" id="bandMids">
        <div class="band-bar-bg"><div class="band-fill mids-fill" id="fillMids"></div></div>
        <span class="band-label">MIDS</span>
      </div>
      <div class="band" id="bandTreble">
        <div class="band-bar-bg"><div class="band-fill treble-fill" id="fillTreble"></div></div>
        <span class="band-label">TREBLE</span>
      </div>
    </div>

    <!-- Controls -->
    <section class="controls" aria-label="Playback controls">

      <!-- Upload zone -->
      <label class="upload-zone" id="uploadZone" for="fileInput" tabindex="0" role="button" aria-label="Upload MP3 file">
        <input type="file" id="fileInput" accept="audio/*" hidden />
        <span class="upload-icon">⬆</span>
        <span class="upload-text">Upload MP3</span>
      </label>

      <!-- Play / Pause -->
      <button class="btn-play" id="btnPlay" aria-label="Play" disabled>
        <span class="play-icon" id="playIcon">▶</span>
      </button>

      <!-- Stop -->
      <button class="btn-stop" id="btnStop" aria-label="Stop" disabled>
        <span>■</span>
      </button>

      <!-- Demo tracks -->
      <div class="demo-panel">
        <span class="demo-label">Demo tracks</span>
        <div class="demo-buttons">
          <button class="btn-demo" id="demo1" data-freq="bass" aria-label="Demo: Bass Pulse">Bass Pulse</button>
          <button class="btn-demo" id="demo2" data-freq="mids" aria-label="Demo: Mids Wave">Mids Wave</button>
          <button class="btn-demo" id="demo3" data-freq="treble" aria-label="Demo: Treble Spark">Treble Spark</button>
        </div>
      </div>

    </section>

    <!-- Theme picker -->
    <div class="theme-picker" id="themePicker" aria-label="Color theme">
      <span class="theme-label">Theme</span>
      <div class="theme-dots">
        <button class="theme-dot active" data-theme="neon"   title="Neon"        aria-label="Neon theme"   style="background:linear-gradient(135deg,#ff2d6b,#b44dff,#00e5ff)"></button>
        <button class="theme-dot"        data-theme="sunset" title="Sunset"      aria-label="Sunset theme" style="background:linear-gradient(135deg,#ff3300,#ff8800,#ffcc00)"></button>
        <button class="theme-dot"        data-theme="matrix" title="Matrix"      aria-label="Matrix theme" style="background:linear-gradient(135deg,#003300,#00cc33,#39ff14)"></button>
        <button class="theme-dot"        data-theme="ocean"  title="Ocean"       aria-label="Ocean theme"  style="background:linear-gradient(135deg,#00bcd4,#2979ff,#7c4dff)"></button>
        <button class="theme-dot"        data-theme="mono"   title="Monochrome"  aria-label="Mono theme"   style="background:linear-gradient(135deg,#444,#999,#eee)"></button>
      </div>
    </div>

    <!-- Volume / RMS indicator -->
    <div class="rms-row" aria-label="Volume indicator">
      <span class="rms-label">VOL</span>
      <div class="rms-track">
        <div class="rms-fill" id="rmsFill"></div>
      </div>
      <span class="rms-value" id="rmsValue">0 dB</span>
    </div>

    <footer class="footer">
      Built with Web Audio API &amp; Canvas · 60fps · Neon Glassmorphism
    </footer>

  </div>

  <!-- Drop detection flash overlay -->
  <div id="dropFlash" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
